<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="900" viewBox="0 0 1100 900">
<style>
    .title { font: 700 36px sans-serif; fill: #0B1F3A; }
    .subtitle { font: 500 17px sans-serif; fill: #36506B; }
    .layer { font: 700 20px sans-serif; fill: #FFFFFF; }
    .text { font: 15px sans-serif; fill: #F1F6FF; }
    .guide { font: 600 14px sans-serif; fill: #1D3557; }
</style>

<defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#F3F8FF"/>
        <stop offset="100%" stop-color="#E6EEF9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#4B5D73"/>
    </marker>
</defs>

<rect x="0" y="0" width="1100" height="900" fill="url(#bg)"/>

<text x="550" y="58" text-anchor="middle" class="title">FDO Lifecycle Integrity Substrate</text>
<text x="550" y="86" text-anchor="middle" class="subtitle">
Layered trust model for registered profile, deterministic verification, and standardization
</text>

<!-- Side guides -->
<rect x="45" y="155" width="70" height="560" rx="16" fill="#DDE7F5"/>
<text x="80" y="438" text-anchor="middle" transform="rotate(-90 80 438)" class="guide">
Integrity Core
</text>

<rect x="985" y="155" width="70" height="560" rx="16" fill="#DDE7F5"/>
<text x="1020" y="438" text-anchor="middle" transform="rotate(90 1020 438)" class="guide">
Adoption Path
</text>

<!-- FDO Base -->
<rect x="150" y="130" width="800" height="84" rx="14" fill="#1565C0"/>
<text x="550" y="166" text-anchor="middle" class="layer">FDO Core Identity Layer</text>
<text x="550" y="190" text-anchor="middle" class="text">
Persistent Identifier • Metadata • Resolution
</text>

<!-- Flow connector -->
<line x1="550" y1="214" x2="550" y2="228" stroke="#4B5D73" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Audit Profile -->
<rect x="150" y="234" width="800" height="94" rx="14" fill="#283593"/>
<text x="550" y="271" text-anchor="middle" class="layer">ARO-Audit Profile (Registered Type)</text>
<text x="550" y="297" text-anchor="middle" class="text">21.T11966/aro-audit-profile-v1</text>

<!-- Flow connector -->
<line x1="550" y1="328" x2="550" y2="344" stroke="#4B5D73" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Integrity Substrate -->
<rect x="150" y="350" width="800" height="114" rx="14" fill="#1B5E20"/>
<text x="550" y="390" text-anchor="middle" class="layer">Integrity Substrate</text>
<text x="550" y="416" text-anchor="middle" class="text">
Multi-target Manifest • Hash-chain Journal • Ed25519 Signature
</text>
<text x="550" y="441" text-anchor="middle" class="text">Deterministic verification_report.json</text>

<!-- Flow connector -->
<line x1="550" y1="464" x2="550" y2="480" stroke="#4B5D73" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Archival Anchor -->
<rect x="150" y="486" width="800" height="94" rx="14" fill="#4A148C"/>
<text x="550" y="523" text-anchor="middle" class="layer">Archival Anchor</text>
<text x="550" y="549" text-anchor="middle" class="text">Zenodo DOI • Reproducible Audit Bundle</text>

<!-- Flow connector -->
<line x1="550" y1="580" x2="550" y2="596" stroke="#4B5D73" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Industrial Mapping -->
<rect x="150" y="602" width="800" height="114" rx="14" fill="#BF360C"/>
<text x="550" y="642" text-anchor="middle" class="layer">Industrial Lifecycle Mapping</text>
<text x="550" y="668" text-anchor="middle" class="text">
Digital Product Passport • Battery Passport • SBOM
</text>
<text x="550" y="693" text-anchor="middle" class="text">Cross-border Sovereign Compliance</text>

<!-- Flow connector -->
<line x1="550" y1="716" x2="550" y2="734" stroke="#4B5D73" stroke-width="3" marker-end="url(#arrow)"/>

<!-- Standardization Path -->
<rect x="150" y="740" width="800" height="124" rx="14" fill="#111111"/>
<text x="550" y="782" text-anchor="middle" class="layer">Standardization Trajectory</text>
<text x="550" y="809" text-anchor="middle" class="text">
FDO Working Group → Interoperability Testing → Formal Recommendation
</text>
<text x="550" y="836" text-anchor="middle" class="text">CEN / ISO Liaison Consideration</text>

</svg>
