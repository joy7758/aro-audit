name: Conformance (Boundary Gate)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  boundary-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps (venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install -e .

      - name: Boundary vectors must hold (v1 verifier contract)
        run: |
          . .venv/bin/activate
          set -euo pipefail
          echo "== base must pass =="
          python sdk/verify/verify.py spec/test_vectors/boundary_base_v1.jsonl spec/test_vectors/keys/test_pubkey.pem || exit 1

          echo "== attestations-only mutation must still pass =="
          python sdk/verify/verify.py spec/test_vectors/boundary_attack_attestations_only.jsonl spec/test_vectors/keys/test_pubkey.pem || exit 1

          echo "== predicate mutation must fail =="
          if python sdk/verify/verify.py spec/test_vectors/boundary_attack_predicate.jsonl spec/test_vectors/keys/test_pubkey.pem; then
            echo "ERROR: predicate mutation unexpectedly passed (boundary broken)"
            exit 2
          else
            echo "OK: predicate mutation rejected"
          fi

      - name: Install MVK Reference Sandbox (Tier-2 Broker)
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap libseccomp-dev

      - name: Run Conformance Suite (Under MVK Confinement)
        run: |
          set -euo pipefail
          echo "Initiating AAR-MCP-2.0 Hard-Gate Boundary..."
          chmod +x conformance/run.sh conformance/report_generator.sh conformance/tests/*.sh
          WORKSPACE="${PWD}"
          RUNNER_HOME="${HOME}"
          echo "Workspace: ${WORKSPACE}"
          echo "Runner home: ${RUNNER_HOME}"
          gcc -O2 -Wall -Wextra conformance/seccomp_exec_wrapper.c -lseccomp -o conformance/seccomp_exec_wrapper

          sudo --preserve-env=WORKSPACE,RUNNER_HOME bwrap \
            --unshare-ipc \
            --unshare-pid \
            --unshare-net \
            --ro-bind / / \
            --dev /dev \
            --proc /proc \
            --ro-bind "${RUNNER_HOME}" "${RUNNER_HOME}" \
            --bind "${WORKSPACE}" "${WORKSPACE}" \
            --tmpfs /tmp \
            --tmpfs /var/tmp \
            --chdir "${WORKSPACE}" \
            --setenv HOME "${RUNNER_HOME}" \
            --setenv CONFORMANCE_EXEC_WRAPPER "${WORKSPACE}/conformance/seccomp_exec_wrapper" \
            --setenv CONFORMANCE_ALLOW_READONLY_PARENT "1" \
            --setenv CONFORMANCE_ESCAPE_TARGET "${RUNNER_HOME}/.aro_conformance_escape_test" \
            --die-with-parent \
            --new-session \
            bash conformance/run.sh

      - name: Upload confinement reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: confinement-reports
          path: |
            conformance_report.json
            conformance_report.md
          if-no-files-found: warn
