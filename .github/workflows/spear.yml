name: spear-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
      - run: npx -y --package god-spear@0.2.0 spear check .github/security/.spear-rules.json
