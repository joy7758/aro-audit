name: spear-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
      - run: npx -y --package god-spear@0.2.0 spear check .github/security/.spear-rules.json
