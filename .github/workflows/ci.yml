name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "CITATION.cff"
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "CITATION.cff"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_lint:
    name: Lint + Tests (PR gate)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Project requires Python >=3.11.
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]" || python -m pip install -e .
          python -m pip install -U ruff pytest

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Pytest
        run: |
          pytest -q

  typing_soft:
    name: Mypy (soft) + summary
    runs-on: ubuntu-latest
    needs: [test_lint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]" || python -m pip install -e .
          python -m pip install -U mypy types-PyYAML

      - name: Mypy core scope (soft gate)
        run: |
          set +e
          mypy \
            --config-file mypy.ini \
            sdk/journal/jsonl_journal.py \
            sdk/keys/org_keys.py \
            sdk/mcp_enforcer/enforcer.py \
            sdk/mcp_enforcer/__init__.py \
            sdk/verify/verify_chain.py \
            pro/export/manifest.py \
            > mypy-core.txt 2>&1
          CORE_RC=$?
          CORE_ERRORS=$(grep -c ": error:" mypy-core.txt || true)
          echo "MYPY_CORE_RC=${CORE_RC}" >> "${GITHUB_ENV}"
          echo "MYPY_CORE_ERRORS=${CORE_ERRORS}" >> "${GITHUB_ENV}"
          cat mypy-core.txt
          exit 0

      - name: Mypy expansion scope (advisory backlog)
        run: |
          set +e
          mypy --config-file mypy.ini aro_audit sdk pro tests > mypy-expansion.txt 2>&1
          EXPANSION_RC=$?
          EXPANSION_ERRORS=$(grep -c ": error:" mypy-expansion.txt || true)
          echo "MYPY_EXPANSION_RC=${EXPANSION_RC}" >> "${GITHUB_ENV}"
          echo "MYPY_EXPANSION_ERRORS=${EXPANSION_ERRORS}" >> "${GITHUB_ENV}"
          cat mypy-expansion.txt
          exit 0

      - name: Typing transition summary
        run: |
          {
            echo "## Mypy Transition Curve"
            echo ""
            echo "| Scope | Exit Code | Error Count |"
            echo "|---|---:|---:|"
            echo "| Core (curated) | ${MYPY_CORE_RC:-0} | ${MYPY_CORE_ERRORS:-0} |"
            echo "| Expansion (full tree) | ${MYPY_EXPANSION_RC:-0} | ${MYPY_EXPANSION_ERRORS:-0} |"
            echo ""
            echo "Core scope is the short-term cleanup target. Expansion scope tracks backlog."
          } >> "${GITHUB_STEP_SUMMARY}"

  security_scheduled:
    name: Security scan (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project + scanners
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]" || python -m pip install -e .
          python -m pip install -U bandit pip-audit

      - name: Bandit (SAST)
        run: |
          bandit -q -r aro_audit sdk pro -x tests -ll

      - name: pip-audit (deps)
        run: |
          python -m pip freeze > requirements-ci.txt
          pip-audit -r requirements-ci.txt || true
